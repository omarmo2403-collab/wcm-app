name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Export Expo web build (served under /wcm-app/)
        working-directory: apps/mobile
        run: |
          node -e "const p=require('./app.json'); p.expo.experiments=p.expo.experiments||{}; p.expo.experiments.baseUrl='/wcm-app'; require('fs').writeFileSync('app.json', JSON.stringify(p,null,2))"
          pnpm exec expo export --platform web
      - name: Build admin dashboard (served under /wcm-app/admin/)
        working-directory: apps/admin
        run: ADMIN_BASE=/wcm-app/admin/ pnpm exec vite build
      - name: SPA fallback, admin at /admin/, prototype at /prototype/
        run: |
          cp apps/mobile/dist/index.html apps/mobile/dist/404.html
          cp -r apps/admin/dist apps/mobile/dist/admin
          cp -r prototype apps/mobile/dist/prototype
          cp docs/privacy.html apps/mobile/dist/privacy.html
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/mobile/dist
      - id: deployment
        uses: actions/deploy-pages@v4
